<header class="navbar" [class.scrolled]="scrolled()" [class.menu-open]="menu.isOpen()">
  <div class="navbar__inner">
    <!-- Brand -->
    <a class="navbar__brand" href="#" (click)="menu.navigateTo('hero'); $event.preventDefault()">
      Yousef Shatnawi
    </a>

    <!-- Desktop nav -->
    <nav class="navbar__links" aria-label="Primary navigation">
      @for (link of menu.links; track link.fragment) {
        <button class="navbar__link" (click)="menu.navigateTo(link.fragment)">
          {{ link.label }}
        </button>
      }
      <button class="navbar__cta" (click)="menu.navigateTo('contact')">
        Hire Me
      </button>
    </nav>

    <!-- Mobile toggle -->
    <button
      class="navbar__toggle"
      [class.open]="menu.isOpen()"
      (click)="menu.toggle()"
      aria-label="Toggle menu"
      [attr.aria-expanded]="menu.isOpen()">
      <span></span>
      <span></span>
    </button>
  </div>
</header>
