<header class="navbar" [class.scrolled]="scrolled()">
  <div class="navbar__inner">
    <!-- Brand -->
    <a class="navbar__brand" href="#" (click)="scrollTo('hero'); $event.preventDefault()">
      Yousef Shatnawi
    </a>

    <!-- Desktop nav -->
    <nav class="navbar__links" aria-label="Primary navigation">
      @for (link of links; track link.fragment) {
        <button class="navbar__link" (click)="scrollTo(link.fragment)">
          {{ link.label }}
        </button>
      }
      <button class="navbar__cta" (click)="scrollTo('contact')">
        Hire Me
      </button>
    </nav>

    <!-- Mobile toggle -->
    <button
      class="navbar__toggle"
      [class.open]="menuOpen()"
      (click)="toggleMenu()"
      aria-label="Toggle menu"
      [attr.aria-expanded]="menuOpen()">
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile panel -->
  <div class="navbar__mobile" [class.open]="menuOpen()" role="dialog" aria-label="Navigation menu">
    <nav>
      @for (link of links; track link.fragment) {
        <button class="navbar__mobile-link" (click)="scrollTo(link.fragment)">
          {{ link.label }}
        </button>
      }
      <button class="navbar__mobile-cta" (click)="scrollTo('contact')">
        Hire Me
      </button>
    </nav>
  </div>
</header>
