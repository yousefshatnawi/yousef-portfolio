<section id="contact" class="contact">
  <div class="contact__inner">

    <div class="contact__content" appReveal>
      <span class="section-label">Contact</span>
      <h2 class="contact__heading">Let's work together.</h2>
      <p class="contact__sub">
        Open to front-end roles and freelance projects.<br>
        Based in Amman — available remotely.
      </p>
    </div>

    <div class="contact__links" appReveal [appRevealDelay]="150">
      <a
        class="contact__link"
        href="https://github.com/yousefshatnawi"
        target="_blank"
        rel="noopener"
        aria-label="GitHub profile">
        <i class="bi bi-github"></i>
        <span>GitHub</span>
        <i class="bi bi-arrow-up-right contact__link-arrow"></i>
      </a>

      <a
        class="contact__link"
        href="https://www.linkedin.com/in/yousef-shatnawi-750b1a14b"
        target="_blank"
        rel="noopener"
        aria-label="LinkedIn profile">
        <i class="bi bi-linkedin"></i>
        <span>LinkedIn</span>
        <i class="bi bi-arrow-up-right contact__link-arrow"></i>
      </a>

      <a
        class="contact__link"
        href="mailto:yousef.shatnawi@icloud.com"
        aria-label="Send email">
        <i class="bi bi-envelope"></i>
        <span>yousef.shatnawi@icloud.com</span>
        <i class="bi bi-arrow-up-right contact__link-arrow"></i>
      </a>

      <a
        class="contact__link"
        href="tel:+962799959225"
        aria-label="Call phone number">
        <i class="bi bi-telephone"></i>
        <span>+962 799 959 225</span>
        <i class="bi bi-arrow-up-right contact__link-arrow"></i>
      </a>
    </div>

  </div>
</section>
