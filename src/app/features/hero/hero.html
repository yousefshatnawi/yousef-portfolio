<section id="hero" class="hero" @heroEnter>
  <div class="hero__inner">

    <span class="hero-animate hero__label">
      Angular Developer &middot; Enterprise Applications
    </span>

    <h1 class="hero-animate hero__heading">
      Building Software<br>
      <span class="hero__heading-accent">That Scales.</span>
    </h1>

    <p class="hero-animate hero__sub">
      Front-end engineer with 2+ years building Angular applications
      for enterprise clients in Jordan and Saudi Arabia.
    </p>

    <div class="hero-animate hero__actions">
      <button class="btn btn--primary" (click)="scrollToProjects()">
        View Projects
        <i class="bi bi-arrow-right"></i>
      </button>
      <a class="btn btn--ghost" href="assets/cv/Yousef%20Shatnawi%20-%20Angular%20Developer.pdf" download="Yousef Shatnawi - Angular Developer.pdf" aria-label="Download CV">
        Download CV
        <i class="bi bi-download"></i>
      </a>
    </div>

    <div class="hero-animate hero__meta">
      <span class="hero__meta-item">
        <i class="bi bi-geo-alt"></i>
        Amman, Jordan
      </span>
      <span class="hero__meta-sep"></span>
      <span class="hero__meta-item">
        <i class="bi bi-circle-fill hero__status-dot"></i>
        Available for opportunities
      </span>
    </div>

  </div>
</section>
